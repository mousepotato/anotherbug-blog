# theme.toml template for a Hugo theme
# See https://github.com/gohugoio/hugoThemes#themetoml for an example

name = "Tapa"
license = "MIT"
licenselink = "https://opensource.org/licenses/MIT"
description = "A PaperMod-derived Hugo theme for anotherbug-blog."
homepage = "https://anotherbug.com"
demosite = "https://anotherbug.com"
tags = [
  "responsive",
  "simple",
  "clean",
  "light",
  "dark",
  "blog",
  "minimalist",
  "highlight.js",
  "search"
]
features = [
  "responsive",
  "single-column",
  "blog",
  "cover-image",
  "table-of-contents",
  "opengraph",
  "highlight.js",
  "favicon",
  "archive",
  "share-icons",
  "cover",
  "multilingual",
  "social-icons",
  "minified-assets",
  "theme-toggle",
  "menu-location-indicator",
  "scroll-to-top",
  "search"
]
min_version = "0.146.0"

[author]
  name = "mousepotato"
  homepage = "https://anotherbug.com"

# If porting an existing theme
[original]
  name = "PaperMod"
  author = "Aditya Telange"
  homepage = "https://github.com/adityatelange/hugo-PaperMod"
  repo = "https://github.com/adityatelange/hugo-PaperMod"
